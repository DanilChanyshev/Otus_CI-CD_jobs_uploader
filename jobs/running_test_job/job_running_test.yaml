---
- job:
    name: running-tests
    project-type: pipeline
    sandbox: true

    parameters:
      - bool:
          name: RUN_API
          default: true
          description: Run API tests
      - bool:
          name: RUN_UI
          default: true
          description: Run UI tests
      - bool:
          name: RUN_MOBILE
          default: false
          description: Run Mobile tests

    dsl: |
      pipeline {
        agent any

        stages {
          stage('Run selected tests') {
            steps {
              script {

                def jobs = [:]

                if (params.RUN_API) {
                  jobs["API tests"] = {
                    build job: "api-tests"
                  }
                }

                if (params.RUN_UI) {
                  jobs["UI tests"] = {
                    build job: "ui-test"
                  }
                }

                if (params.RUN_MOBILE) {
                  jobs["Mobile tests"] = {
                    build job: "mobile-tests"
                  }
                }

                if (jobs.isEmpty()) {
                  error("No jobs selected to run")
                }

                parallel jobs
              }
            }
          }
        }
      }