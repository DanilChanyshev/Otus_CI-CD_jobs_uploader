---
- job:
    name: running-tests
    project-type: pipeline
    sandbox: true

    parameters:
      - bool:
          name: RUN_API
          default: true
          description: Run API tests

      - bool:
          name: RUN_UI
          default: true
          description: Run UI tests

      - bool:
          name: RUN_MOBILE
          default: false
          description: Run Mobile tests

    dsl: !include-raw: pipeline/run_tests.groovy