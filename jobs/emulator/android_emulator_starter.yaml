---
- job:
    name: android-emulator
    description: "<p style='color: green;'>Android emulator pipeline</p>"

    project-type: pipeline
    concurrent: true

    parameters:
      - string:
          name: BRANCH
#          default: jenkins-job
          default: ansible
          description: "Git branch name"

    pipeline-scm:
      scm:
        - git:
#            url: https://github.com/DanilChanyshev/MobileTest.git
            url: https://github.com/DanilChanyshev/OTUS-hm-selenium.git
            credentials-id: ssh_key
            branches:
              - ansible

      script-path: pipeline/selenoid-ui.groovy