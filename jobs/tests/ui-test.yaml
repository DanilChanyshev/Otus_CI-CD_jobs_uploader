---
- job:
    name: ui-test
    description: "<p style='color: green;'>UI tests pipeline</p>"

    project-type: pipeline
    concurrent: true

    parameters:
      - string:
          name: BRANCH
          default: ansible
          description: "Git branch name"

    pipeline-scm:
      scm:
        - git:
            url: https://github.com/DanilChanyshev/OTUS-hm-selenium.git
            credentials-id: ssh_key
            branches:
              - ansible

      script-path: pipeline/ui-test-pipeline.groovy